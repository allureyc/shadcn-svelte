# Custom registry-site deployment
#
# Mirrors `deploy-prod.yml` but adds the extra-registry build step.
# Use this workflow for deploying YOUR fork's xxx.io site so upstream's
# `deploy-prod.yml` can stay untouched and conflict-free during sync.
#
# Configure the deploy target by editing the "Deploy" step at the bottom.

name: Deploy Custom Registry Site

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - packages/registry/**
      - .github/workflows/deploy-custom-registry.yml
  workflow_dispatch:

# Avoid clobbering the official deploy job that may also run on the same push.
concurrency:
  group: deploy-custom-registry
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Build & deploy custom registry site
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Official site build (also builds the official registry under the hood
      # via `pnpm sync` / the various build:* scripts).
      - name: Build site
        working-directory: docs
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          pnpm build:registry
          pnpm tsx scripts/extra-registry/build.ts
          pnpm build

      # ---------------------------------------------------------------------
      # Deploy step — replace with your own provider.
      # Example (Cloudflare Pages via wrangler, mirrors official deploy-prod):
      # ---------------------------------------------------------------------
      - name: Deploy to Cloudflare
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        working-directory: docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy
